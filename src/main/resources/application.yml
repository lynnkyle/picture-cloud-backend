server:
  port: 8082
  servlet:
    context-path: /api
    session:
      timeout: 1d
spring:
  profiles:
    active: local
  application:
    name: picture-cloud
  servlet:
    multipart:
      max-file-size: 5MB
  session:
    store-type: redis
    timeout: 86400
    redis:
      namespace: "picture-cloud:session"
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_delete
      logic-delete-value: 1
      logic-not-delete-value: 0
# API文档生成管理工具
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    enabled: true
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'user'
      display-name: '用户管理'
      paths-to-match: '/user/**'
      packages-to-scan: org.example.picturecloudbackend.controller.user
    - group: 'picture'
      display-name: '图片管理'
      paths-to-match: '/picture/**'
      packages-to-scan: org.example.picturecloudbackend.controller.picture
    - group: 'space'
      display-name: '空间管理'
      paths-to-match: '/space/**'
      packages-to-scan: org.example.picturecloudbackend.controller.space
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn